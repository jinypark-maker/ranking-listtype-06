<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Ranking ListType 06 — 5 Variants</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: radial-gradient(ellipse at top, #1f2226 0%, #0e1012 70%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Sans", "Apple SD Gothic Neo", "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 56px;
      padding: 32px 24px;
      flex-wrap: wrap;
    }
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .head {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .head .crumb {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.4px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }
    .head .title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      line-height: 1.2;
    }
    .head .desc {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
    }

    .case-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .case-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .case-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-align: left;
    }
    .case-btn:hover {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.85);
    }
    .case-btn.active {
      background: rgba(25,195,138,0.14);
      border-color: rgba(25,195,138,0.5);
      color: #fff;
    }
    .case-btn .rank-num {
      font-family: "SF Pro Text", sans-serif;
      font-weight: 600;
      font-style: italic;
      font-size: 18px;
      width: 22px;
      flex-shrink: 0;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }
    .case-btn.active .rank-num {
      color: #19c38a;
    }
    .case-btn .case-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .case-btn .case-info .key {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .case-btn .case-info .sub {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .case-btn .kbd {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
    }
    .case-btn.active .kbd {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    .auto-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .auto-row {
      display: flex;
      gap: 6px;
    }
    .auto-btn {
      flex: 1;
      padding: 10px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .auto-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .auto-btn.on {
      background: rgba(25,195,138,0.18);
      border-color: rgba(25,195,138,0.5);
      color: #19c38a;
    }

    .footnote {
      font-size: 10px;
      color: rgba(255,255,255,0.32);
      line-height: 1.6;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .footnote kbd {
      font-family: "SF Mono", monospace;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      margin: 0 2px;
    }

    /* === Phone frame === */
    .phone-stage {
      position: relative;
      width: 375px;
      flex-shrink: 0;
    }
    .phone-frame {
      width: 375px;
      height: 812px;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 0 0 8px #1a1c1e,
        0 0 0 10px #2c3036,
        0 30px 80px rgba(0,0,0,0.6),
        0 60px 180px rgba(0,0,0,0.45);
      background: #fff;
    }
    .phone-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .phone-img.active { opacity: 1; }

    /* notch overlay */
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      pointer-events: none;
    }

    .phone-caption {
      margin-top: 22px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .phone-caption .node {
      font-family: "SF Mono", monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.4px;
    }
    .phone-caption .label {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
    }
    .phone-caption .accent {
      color: #19c38a;
    }

    /* Progress dots */
    .progress-row {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: all 0.3s;
    }
    .dot.active {
      width: 24px;
      border-radius: 3px;
      background: #19c38a;
    }

    @media (max-width: 900px) {
      .page { flex-direction: column; gap: 32px; padding: 24px 16px; }
      .sidebar { width: 100%; max-width: 375px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const VARIANTS = [
  {
    rank: 1,
    nodeId: "211:103523",
    image: "images/figma-1.png",
    key: "BTS",
    sub: "3년 9개월 만에 5집 앨범",
    color: "#920000"
  },
  {
    rank: 2,
    nodeId: "211:103888",
    image: "images/figma-2.png",
    key: "WBC",
    sub: "오타니 대 트라우트 재대결",
    color: "#185949"
  },
  {
    rank: 3,
    nodeId: "211:104266",
    image: "images/figma-3.png",
    key: "나츠키",
    sub: "VOCE 6월호 단독 표지",
    color: "#377fb9"
  },
  {
    rank: 4,
    nodeId: "211:104649",
    image: "images/figma-4.png",
    key: "우메다 사이퍼",
    sub: "3집 앨범 9월 24일 발매",
    color: "#6e5d41"
  },
  {
    rank: 5,
    nodeId: "211:105026",
    image: "images/figma-5.png",
    key: "LISA",
    sub: "그래미 12개 부문 수상",
    color: "#2d4372"
  }
];

function App() {
  const [active, setActive] = useState(0);
  const [auto, setAuto] = useState(false);
  const [speed, setSpeed] = useState(2200);
  const speedRef = useRef(speed);
  speedRef.current = speed;

  useEffect(() => {
    if (!auto) return;
    const id = setInterval(() => {
      setActive(prev => (prev + 1) % 5);
    }, speedRef.current);
    return () => clearInterval(id);
  }, [auto, speed]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key >= '1' && e.key <= '5') {
        setAuto(false);
        setActive(parseInt(e.key, 10) - 1);
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        setAuto(false);
        setActive(prev => (prev + 1) % 5);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        setAuto(false);
        setActive(prev => (prev - 1 + 5) % 5);
      } else if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
        setAuto(a => !a);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const cur = VARIANTS[active];

  return (
    <div className="page">
      <div className="sidebar">
        <div className="head">
          <div className="crumb">2026.05 Ranking Ideation</div>
          <div className="title">Ranking ListType 06</div>
          <div className="desc">동일한 TOP 5 모듈에서 강조되는 랭크 위치만 달라지는 5개 variant를 비교합니다.</div>
        </div>

        <div className="case-section">
          <div className="section-label">Featured Rank</div>
          <div className="case-grid">
            {VARIANTS.map((v, i) => (
              <button
                key={v.rank}
                className={"case-btn" + (active === i ? " active" : "")}
                onClick={() => { setAuto(false); setActive(i); }}
              >
                <span className="rank-num">{v.rank}</span>
                <span className="case-info">
                  <span className="key">{v.key}</span>
                  <span className="sub">{v.sub}</span>
                </span>
                <span className="kbd">{v.rank}</span>
              </button>
            ))}
          </div>
        </div>

        <div className="auto-section">
          <div className="section-label">Auto Play</div>
          <button
            className={"auto-btn" + (auto ? " on" : "")}
            onClick={() => setAuto(a => !a)}
            style={{padding: "12px 8px", fontSize: 12}}
          >
            {auto ? "⏸  Pause" : "▶  Play"}
          </button>
          {auto && (
            <div className="auto-row">
              <button className={"auto-btn" + (speed === 3500 ? " on" : "")} onClick={() => setSpeed(3500)}>천천히</button>
              <button className={"auto-btn" + (speed === 2200 ? " on" : "")} onClick={() => setSpeed(2200)}>보통</button>
              <button className={"auto-btn" + (speed === 1200 ? " on" : "")} onClick={() => setSpeed(1200)}>빠르게</button>
            </div>
          )}
        </div>

        <div className="footnote">
          <kbd>1</kbd>–<kbd>5</kbd> 변형 전환 ·  <kbd>←</kbd><kbd>→</kbd> 이전/다음 ·  <kbd>Space</kbd> 자동 재생
        </div>
      </div>

      <div className="phone-stage">
        <div className="phone-frame">
          {VARIANTS.map((v, i) => (
            <img
              key={v.rank}
              src={v.image}
              alt={`Rank ${v.rank} featured`}
              className={"phone-img" + (active === i ? " active" : "")}
              loading={i === 0 ? "eager" : "lazy"}
            />
          ))}
        </div>
        <div className="progress-row">
          {VARIANTS.map((v, i) => (
            <div
              key={v.rank}
              className={"dot" + (active === i ? " active" : "")}
              onClick={() => { setAuto(false); setActive(i); }}
              style={{cursor: "pointer"}}
            />
          ))}
        </div>
        <div className="phone-caption">
          <div className="label">
            Rank <span className="accent">#{cur.rank}</span> · {cur.key}
          </div>
          <div className="node">{cur.nodeId}</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
