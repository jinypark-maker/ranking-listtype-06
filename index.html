<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Ranking ListType 06</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Sans", "Apple SD Gothic Neo", "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      color: #fff;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      gap: 24px;
    }
    .case-selector {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .case-label {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      text-align: center;
    }
    .case-row {
      display: flex;
      gap: 6px;
    }
    .case-btn {
      flex: 1;
      padding: 12px 8px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .case-btn:hover {
      background: rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.9);
    }
    .case-btn.active {
      background: #fff;
      color: #111;
    }
    .case-btn .sub {
      font-size: 9px;
      font-weight: 500;
      opacity: 0.7;
    }
    .phone-frame {
      width: 375px;
      height: 812px;
      background: #fff;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 8px #2a2a2a, 0 0 0 9px #444;
    }
    .scroll-area {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }
    .canvas {
      position: relative;
      width: 375px;
      height: 1320px;
      background: #fff;
    }
    /* === Status bar === */
    .status-bar {
      position: absolute;
      top: 0; left: 0;
      width: 375px;
      height: 47px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px 0 36px;
      font-family: "SF Pro", -apple-system, sans-serif;
      font-weight: 600;
      font-size: 17px;
      color: #000;
      z-index: 10;
      background: #fff;
    }
    .status-time {
      letter-spacing: -0.4px;
      padding-top: 16px;
    }
    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-top: 16px;
    }
    .status-bar svg { display: block; }

    /* === Header === */
    .header {
      position: absolute;
      top: 47px; left: 0;
      width: 375px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }
    .header-title {
      font-family: "SF Pro Text", sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #111;
      letter-spacing: -0.4px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .icon-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* === Profile row === */
    .profile-row {
      position: absolute;
      top: 99px; left: 16px;
      width: 343px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .profile-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd2c0, #f4a89a);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name {
      font-family: "SF Pro Text", sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: #111;
    }

    /* === Friends list grid === */
    .grid-cards {
      position: absolute;
      top: 175px;
      left: 16px;
      width: 343px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .grid-card {
      background: #fff;
      border: 1px solid #efefef;
      border-radius: 16px;
      padding: 14px 16px 16px;
    }
    .grid-card-header {
      font-family: "SF Pro Text", sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: #111;
      margin-bottom: 10px;
    }
    .grid-card-items {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .grid-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
      max-width: 60px;
    }
    .grid-item-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #f5f5f5;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .grid-item-icon img { width: 100%; height: 100%; object-fit: cover; }
    .grid-item-label {
      font-family: "SF Pro Text", sans-serif;
      font-weight: 500;
      font-size: 11px;
      color: #2a2a2a;
      text-align: center;
      line-height: 1.2;
    }
    .friends-avatars {
      display: flex;
      gap: -8px;
    }
    .friend-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #ddd;
      border: 2px solid #fff;
      margin-left: -8px;
      overflow: hidden;
    }
    .friend-avatar:first-child { margin-left: 0; }
    .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* === News card === */
    .news-card {
      position: absolute;
      top: 555px;
      left: 16px;
      width: 343px;
      border: 1px solid #efefef;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }
    .news-image {
      position: relative;
      width: 100%;
      height: 193px;
      overflow: hidden;
      background: #000;
    }
    .news-image img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .news-image::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0; height: 60px;
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.2) 100%);
    }
    .news-body {
      padding: 12px 14px 14px;
    }
    .news-publisher {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .news-pub-label {
      font-family: "Hiragino Sans", sans-serif;
      font-weight: 600;
      font-size: 11px;
      color: #111;
    }
    .news-pub-web {
      font-family: "SF Pro Text", sans-serif;
      font-weight: 600;
      font-size: 11px;
      color: #111;
    }
    .news-pub-source {
      font-family: "SF Pro Text", sans-serif;
      font-size: 10px;
      color: #777;
      margin-left: auto;
    }
    .news-title {
      font-family: "Hiragino Sans", sans-serif;
      font-weight: 300;
      font-size: 14px;
      line-height: 1.5;
      color: #111;
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }
    .news-meta {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: "SF Pro Text", sans-serif;
      font-size: 11px;
      color: #909090;
    }
    .news-meta .reactions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .news-meta .reactions-count {
      font-weight: 590;
      color: #111;
    }
    .sound-pill {
      position: absolute;
      top: 161px;
      right: 12px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* === For You header === */
    .for-you-section {
      position: absolute;
      top: 850px;
      left: 0;
      width: 375px;
    }
    .for-you-title {
      padding: 0 16px;
      font-family: "Apple SD Gothic Neo", "Hiragino Sans", sans-serif;
      font-weight: 800;
      font-size: 17px;
      line-height: 22px;
      letter-spacing: -0.4px;
      white-space: nowrap;
      margin-bottom: 4px;
    }
    .for-you-title .entertain { color: #00a36d; }
    .for-you-title .five {
      color: #00a36d;
      font-family: "SF Pro Text", sans-serif;
      font-weight: 900;
      font-style: italic;
    }
    .for-you-sub {
      padding: 6px 16px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pub-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      overflow: hidden;
      background: #e8e8e8;
      flex-shrink: 0;
    }
    .pub-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .pub-name {
      font-family: "Hiragino Sans", sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: #111;
      flex: 1;
    }
    .follow-btn {
      height: 28px;
      padding: 0 12px;
      border-radius: 14px;
      border: 1px solid #efefef;
      background: #fff;
      font-family: "Hiragino Sans", sans-serif;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: -0.3px;
      color: #111;
      cursor: pointer;
    }

    /* === Square cover === */
    .square-cover {
      position: absolute;
      top: 942px;
      left: 16px;
      width: 343px;
      height: 343px;
      border-radius: 10px 10px 0 0;
      overflow: hidden;
      background: linear-gradient(135deg, #b8e6c4, #f5b6c8);
    }
    .square-cover img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .square-sound {
      position: absolute;
      top: 307px;
      left: 307px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .square-desc {
      position: absolute;
      top: 1295px;
      left: 16px;
      width: 343px;
      font-family: "Hiragino Sans", sans-serif;
      font-weight: 300;
      font-size: 14px;
      line-height: 1.5;
      color: #111;
    }

    /* === Ranking rows === */
    .ranking-area {
      position: absolute;
      left: 0;
      top: 349px;
      width: 375px;
    }
    .rank-row {
      position: absolute;
      left: 16px;
      background: #fafafa;
      border: 1px solid #efefef;
      border-radius: 50px;
      height: 56px;
      width: 343px;
      transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      padding: 0 60px 0 38px;
    }
    .rank-row.featured {
      height: 73px;
      width: 351px;
      border-radius: 46px;
      border-color: #19c38a;
      padding: 0 70px 0 35px;
      z-index: 2;
    }
    .rank-number {
      position: absolute;
      left: 38px;
      font-family: "SF Pro Text", sans-serif;
      font-weight: 600;
      font-style: italic;
      font-size: 23px;
      letter-spacing: -1.15px;
      color: #131313;
      width: 14px;
      text-align: left;
      transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .rank-row.featured .rank-number {
      left: 35px;
      font-size: 25px;
      letter-spacing: -1.25px;
      color: #00a36d;
    }
    .rank-title {
      position: absolute;
      left: 66px;
      width: 224px;
      font-size: 15px;
      line-height: 20px;
      font-family: "Apple SD Gothic Neo", "Hiragino Sans", sans-serif;
      font-weight: 400;
      color: #131313;
      letter-spacing: -0.3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .rank-title .num {
      font-family: "SF Pro Text", sans-serif;
      font-weight: 400;
    }
    .rank-row.featured .rank-title {
      white-space: normal;
      background: linear-gradient(124deg, rgb(0,119,79) 6%, rgb(7,57,40) 13%, rgb(0,0,0) 61%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 500;
      max-height: 60px;
      overflow: hidden;
    }
    .rank-thumb {
      position: absolute;
      right: 22px;
      top: 6px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      overflow: hidden;
      background: #e8e8e8;
      transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .rank-row.featured .rank-thumb {
      right: 16px;
      top: 7px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
    }
    .rank-thumb img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .rank-thumb .layer-2 {
      clip-path: inset(0 0 0 50%);
    }
    .rank-thumb .layer-3 {
      clip-path: inset(0 0 0 66%);
    }

    /* === Bottom tab bar === */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 375px;
      height: 83px;
      background: #fff;
      border-top: 1px solid #efefef;
      display: flex;
      align-items: flex-start;
      padding-top: 8px;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .tab-icon {
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tab-label {
      font-family: "SF Pro Text", sans-serif;
      font-weight: 400;
      font-size: 9px;
      color: #111;
    }
    .tab-item.active .tab-label { font-weight: 600; }
    .home-indicator {
      position: absolute;
      bottom: 9px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      border-radius: 3px;
      background: #000;
    }

    /* Auto-play indicator */
    .autoplay-control {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    .ap-btn {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
    }
    .ap-btn.on {
      background: rgba(25,195,138,0.2);
      color: #19c38a;
    }
    .title-row {
      text-align: center;
      margin-bottom: 4px;
    }
    .title-row .t1 {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.4px;
    }
    .title-row .t2 {
      font-size: 11px;
      color: rgba(255,255,255,0.32);
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const RANKS = [
  {
    rank: 1,
    thumbs: ["images/thumb-0.png"],
    thumbOffset: { single: { left: "-62.77%", top: "-8.34%", width: "188.73%", height: "125.92%" } },
    fragments: [
      { kind: "kr", text: "BTS, " },
      { kind: "num", text: "3" },
      { kind: "kr", text: "년 " },
      { kind: "num", text: "9" },
      { kind: "kr", text: "개월 만에 " },
      { kind: "num", text: "5" },
      { kind: "kr", text: "집 앨범 〈아리랑〉 발매 인기 뜨거워" }
    ]
  },
  {
    rank: 2,
    thumbs: ["images/thumb-1.png", "images/thumb-2.png"],
    fragments: [
      { kind: "kr", text: "오늘 " },
      { kind: "num", text: "9" },
      { kind: "kr", text: "시" },
      { kind: "num", text: ", WBC" },
      { kind: "kr", text: " 오타니 대 트라우트 재대결 방영 시작" }
    ]
  },
  {
    rank: 3,
    thumbs: ["images/thumb-3.png", "images/thumb-4.png"],
    fragments: [
      { kind: "kr", text: "나츠키, 뷰티 잡지" },
      { kind: "num", text: " 『VOCE』 6" },
      { kind: "kr", text: "월호에서 " },
      { kind: "num", text: "3" },
      { kind: "kr", text: "종 단독 표지 등장" }
    ]
  },
  {
    rank: 4,
    thumbs: ["images/thumb-5.png"],
    fragments: [
      { kind: "kr", text: "우메다 사이퍼, " },
      { kind: "num", text: "3" },
      { kind: "kr", text: "집 앨범 " },
      { kind: "num", text: "『HAPPY RETENTION』 9" },
      { kind: "kr", text: "월 " },
      { kind: "num", text: "24" },
      { kind: "kr", text: "일 발매..." }
    ]
  },
  {
    rank: 5,
    thumbs: ["images/thumb-6.png", "images/thumb-7.png", "images/thumb-8.png"],
    fragments: [
      { kind: "num", text: "LISA" },
      { kind: "kr", text: " 그래미 " },
      { kind: "num", text: "12" },
      { kind: "kr", text: "개 부문에서 깜짝 수상한 소감이 화제" }
    ]
  }
];

const ROW_HEIGHT_NORMAL = 56;
const ROW_HEIGHT_FEATURED = 73;
const ROW_GAP = 6;
const TOP_BASE = 349;

function getRowTop(idx, featuredIdx) {
  let top = TOP_BASE;
  for (let i = 0; i < idx; i++) {
    top += (i === featuredIdx ? ROW_HEIGHT_FEATURED : ROW_HEIGHT_NORMAL) + ROW_GAP;
  }
  return top;
}

function Thumb({ rank }) {
  const data = RANKS[rank];
  if (data.thumbs.length === 1) {
    if (data.thumbOffset && data.thumbOffset.single) {
      return (
        <img
          src={data.thumbs[0]}
          style={{
            position: "absolute",
            left: data.thumbOffset.single.left,
            top: data.thumbOffset.single.top,
            width: data.thumbOffset.single.width,
            height: data.thumbOffset.single.height,
            objectFit: "cover",
            maxWidth: "none"
          }}
          alt=""
        />
      );
    }
    return <img src={data.thumbs[0]} alt="" />;
  }
  if (data.thumbs.length === 2) {
    return (
      <>
        <img src={data.thumbs[0]} style={{ clipPath: "inset(0 50% 0 0)" }} alt=""/>
        <img src={data.thumbs[1]} style={{ clipPath: "inset(0 0 0 50%)" }} alt=""/>
      </>
    );
  }
  // 3 layers
  return (
    <>
      <img src={data.thumbs[0]} style={{ clipPath: "inset(0 66.66% 0 0)" }} alt=""/>
      <img src={data.thumbs[1]} style={{ clipPath: "inset(0 33.33% 0 33.33%)" }} alt=""/>
      <img src={data.thumbs[2]} style={{ clipPath: "inset(0 0 0 66.66%)" }} alt=""/>
    </>
  );
}

function RankTitle({ rank, featured }) {
  const data = RANKS[rank];
  return (
    <>{data.fragments.map((f, i) => (
      <span key={i} className={f.kind === "num" ? "num" : ""}>{f.text}</span>
    ))}</>
  );
}

function StatusBar() {
  return (
    <div className="status-bar">
      <div className="status-time">9:41</div>
      <div className="status-icons">
        {/* Signal */}
        <svg width="18" height="10" viewBox="0 0 18 10" fill="none">
          <rect x="0" y="6" width="3" height="4" rx="0.5" fill="#000"/>
          <rect x="5" y="4" width="3" height="6" rx="0.5" fill="#000"/>
          <rect x="10" y="2" width="3" height="8" rx="0.5" fill="#000"/>
          <rect x="15" y="0" width="3" height="10" rx="0.5" fill="#000"/>
        </svg>
        {/* Wifi */}
        <svg width="16" height="11" viewBox="0 0 16 11" fill="none">
          <path d="M8 11l2-2c-.6-.6-1.4-1-2-1s-1.4.4-2 1l2 2zm-4-4l1.5-1.5C6.5 4.5 7.2 4 8 4s1.5.5 2.5 1.5L12 7c-1.2-1.2-2.5-2-4-2s-2.8.8-4 2zm-3-3l1.5-1.5C4 1 6 0 8 0s4 1 5.5 2.5L15 4c-1.8-1.8-4.3-3-7-3s-5.2 1.2-7 3z" fill="#000"/>
        </svg>
        {/* Battery */}
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none">

function RankingArea({ featuredRank }) {
  // featuredRank: 1..5 (1-based)
  const featuredIdx = featuredRank - 1;
  return (
    <>
      {RANKS.map((r, idx) => {
        const top = getRowTop(idx, featuredIdx);
        const isF = idx === featuredIdx;
        return (
          <div
            key={r.rank}
            className={"rank-row" + (isF ? " featured" : "")}
            style={{ top: top + "px" }}
          >
            <span className="rank-number">{r.rank}</span>
            <div className="rank-title">
              <RankTitle rank={idx} featured={isF}/>
            </div>
            <div className="rank-thumb">
              <Thumb rank={idx}/>
            </div>
          </div>
        );
      })}
    </>
  );
}

function PhoneScreen({ featuredRank }) {
  // Scroll to the ranking area when component mounts/featuredRank changes
  const scrollRef = useRef(null);
  const initialScroll = useRef(false);
  useEffect(() => {
    if (!initialScroll.current && scrollRef.current) {
      scrollRef.current.scrollTop = 320;
      initialScroll.current = true;
    }
  }, []);
  return (
    <div className="phone-frame">
      <div className="scroll-area" ref={scrollRef}>
        <div className="canvas">
          <StatusBar/>
          <Header/>
          <ProfileRow/>
          <GridCards/>
          <NewsCard/>
          <ForYouSection/>
          <RankingArea featuredRank={featuredRank}/>
          <SquareCover/>
        </div>
      </div>
      <TabBar/>
    </div>
  );
}

function App() {
  const [featured, setFeatured] = useState(1);
  const [autoplay, setAutoplay] = useState(false);
  const [speed, setSpeed] = useState(2500);

  useEffect(() => {
    if (!autoplay) return;
    const id = setInterval(() => {
      setFeatured(prev => prev === 5 ? 1 : prev + 1);
    }, speed);
    return () => clearInterval(id);
  }, [autoplay, speed]);

  return (
    <div className="page">
      <div className="case-selector">
        <div className="title-row">
          <div className="t1">Ranking ListType 06</div>
          <div className="t2">5개 variant — 강조되는 랭크 위치만 다름</div>
        </div>
        <div className="case-label">Featured Rank</div>
        <div className="case-row">
          {[1,2,3,4,5].map(n => (
            <button
              key={n}
              className={"case-btn" + (featured === n ? " active" : "")}
              onClick={() => { setAutoplay(false); setFeatured(n); }}
            >
              <span>#{n}</span>
              <span className="sub">{["BTS","WBC","나츠키","우메다","LISA"][n-1]}</span>
            </button>
          ))}
        </div>
        <div className="autoplay-control">
          <button className={"ap-btn" + (autoplay ? " on" : "")} onClick={() => setAutoplay(!autoplay)}>
            {autoplay ? "⏸ 자동 재생 정지" : "▶ 자동 재생"}
          </button>
          {autoplay && (
            <>
              <button className="ap-btn" onClick={() => setSpeed(1500)}>빠르게</button>
              <button className="ap-btn" onClick={() => setSpeed(2500)}>보통</button>
              <button className="ap-btn" onClick={() => setSpeed(4000)}>천천히</button>
            </>
          )}
        </div>
      </div>
      <PhoneScreen featuredRank={featured}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
